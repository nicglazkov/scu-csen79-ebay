<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Lite - Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
  <nav id="main-nav">
    <a href="index.html">Dashboard</a>
    <a href="pages/profile.html">My Profile</a>
    <a href="pages/logs.html">Logs</a>
    <a href="pages/stress.html">Stress Test</a>
    <div id="user-info">
      <span id="logged-in-label">Logged in as:</span>
      <select id="user-select">
        <option value="user0">user0</option>
        <option value="user1">user1</option>
        <option value="user2">user2</option>
        <option value="user3">user3</option>
        <option value="user4">user4</option>
        <option value="user5">user5</option>
        <option value="user6">user6</option>
        <option value="user7">user7</option>
        <option value="user8">user8</option>
        <option value="user9">user9</option>
      </select>
    </div>
  </nav>

  <main id="dashboard">
    <div id="dashboard-header">
      <h1>Dashboard</h1>
      <div id="sort-controls">
        <button id="add-listing-btn">+ Add Listing</button>
        <div id="view-toggle">
          <button id="view-card-btn" title="Card view">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <rect x="0" y="0" width="7" height="7" rx="1"/><rect x="9" y="0" width="7" height="7" rx="1"/>
              <rect x="0" y="9" width="7" height="7" rx="1"/><rect x="9" y="9" width="7" height="7" rx="1"/>
            </svg>
          </button>
          <button id="view-list-btn" title="List view">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <rect x="0" y="1" width="16" height="3" rx="1"/><rect x="0" y="6" width="16" height="3" rx="1"/>
              <rect x="0" y="11" width="16" height="3" rx="1"/>
            </svg>
          </button>
        </div>
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="sortAlpha">Name (A to Z)</option>
          <option value="sortAlphaRev">Name (Z to A)</option>
          <option value="sortCurrPrice">Current Price (High to Low)</option>
          <option value="sortCurrPriceRev">Current Price (Low to High)</option>
          <option value="sortBuyOutright">Buy Outright (High to Low)</option>
          <option value="sortBuyOutrightRev">Buy Outright (Low to High)</option>
          <option value="sortTimeLeft">Time Left (Most to Least)</option>
          <option value="sortTimeLeftRev">Time Left (Least to Most)</option>
        </select>
      </div>
    </div>
    <form id="add-listing-form" style="display:none">
      <input type="text" id="new-name" placeholder="Name" required>
      <input type="text" id="new-desc" placeholder="Description">
      <input type="number" id="new-start" placeholder="Starting price" step="0.01" min="0.01" required>
      <input type="number" id="new-buyout" placeholder="Buy Now price" step="0.01" min="0.01" required>
      <input type="number" id="new-time" placeholder="Duration (seconds)" min="1" required>
      <button type="submit">Create</button>
      <button type="button" id="cancel-listing-btn">Cancel</button>
    </form>

    <div id="listings-grid"></div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
