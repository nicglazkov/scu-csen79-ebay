<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Lite - Dashboard</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
  <nav id="main-nav">
    <a href="index.html">Dashboard</a>
    <a href="pages/profile.html">My Profile</a>
  </nav>

  <main id="dashboard">
    <div id="dashboard-header">
      <h1>Dashboard</h1>
      <div id="sort-controls">
        <label for="sort-select">Sort by:</label>
        <select id="sort-select">
          <option value="sortAlphaRev">Name (A→Z)</option>
          <option value="sortAlpha">Name (Z→A)</option>
          <option value="sortCurrPrice">Current Price (High→Low)</option>
          <option value="sortCurrPriceRev">Current Price (Low→High)</option>
          <option value="sortBuyOutright">Buy Outright (High→Low)</option>
          <option value="sortBuyOutrightRev">Buy Outright (Low→High)</option>
          <option value="sortTimeLeft">Time Left (Most→Least)</option>
          <option value="sortTimeLeftRev">Time Left (Least→Most)</option>
        </select>
      </div>
    </div>
    <div id="listings-grid"></div>
  </main>

  <script src="js/main.js"></script>
  <script src="js/dashboard.js"></script>
</body>

</html>
