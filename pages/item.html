<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Lite - Bid</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/item.css">
</head>
<body>
  <nav id="main-nav">
    <a href="../index.html">Dashboard</a>
    <a href="profile.html">My Profile</a>
    <select id="user-select">
      <option value="user0">user0</option>
      <option value="user1">user1</option>
      <option value="user2">user2</option>
      <option value="user3">user3</option>
    </select>
  </nav>

  <main id="item-detail">
    <div id="item-image-col">
      <div id="item-image"></div>
    </div>
    <div id="item-info-col">
      <h1 id="item-title"></h1>
      <p id="item-condition"></p>

      <div id="bid-section">
        <p id="current-bid-label">Current bid</p>
        <p id="current-bid"></p>
        <p id="bid-count"></p>
        <p id="time-left"></p>

        <div id="bid-controls">
          <button id="bid-increment-btn">Bid +minimum</button>
          <div id="custom-bid">
            <input type="number" id="custom-bid-input" placeholder="Custom amount" step="0.01" min="0">
            <button id="custom-bid-btn">Place Bid</button>
          </div>
        </div>
      </div>

      <div id="buyout-section">
        <p id="buyout-label">Buy It Now</p>
        <p id="buyout-price"></p>
        <button id="buyout-btn">Buy It Now</button>
      </div>

      <div id="seller-section">
        <p>Seller: <span id="seller-name"></span></p>
      </div>

      <div id="description-section">
        <h2>Description</h2>
        <p id="item-description"></p>
      </div>
    </div>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/item.js"></script>
</body>
</html>
