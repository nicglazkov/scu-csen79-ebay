<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eBay Lite - My Profile</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <nav id="main-nav">
    <a href="../index.html">Dashboard</a>
    <a href="profile.html">My Profile</a>
    <a href="logs.html">Logs</a>
    <select id="user-select">
      <option value="user0">user0</option>
      <option value="user1">user1</option>
      <option value="user2">user2</option>
      <option value="user3">user3</option>
    </select>
  </nav>

  <main id="profile">
    <h1>My Profile (<span id="profile-name">...</span>)</h1>

    <section class="profile-section">
      <h2>Currently Selling</h2>
      <ul id="list-selling"><li>Loading...</li></ul>
    </section>

    <section class="profile-section">
      <h2>Active Bids</h2>
      <ul id="list-interested"><li>Loading...</li></ul>
    </section>

    <section class="profile-section">
      <h2>Won / Purchased</h2>
      <ul id="list-purchased"><li>Loading...</li></ul>
    </section>

    <section class="profile-section">
      <h2>Lost Auctions</h2>
      <ul id="list-lost"><li>Loading...</li></ul>
    </section>
  </main>

  <script src="../js/main.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
